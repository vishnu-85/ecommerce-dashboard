<div>
    <h1>Dashboard</h1>
    <button (click)="loadUserList()">Load</button>
    @if(users$ | async; as users){
        @if(loading$ | async; as loading){
            {{loading ? 'Loading...':''}}
        }
        @for (item of users; track item.id) {
            <p>{{item.name}}</p>
        }
    }
</div>
